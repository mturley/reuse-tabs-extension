<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      margin: 0;
      padding: 12px;
      min-width: 220px;
    }
    h3 {
      margin: 0 0 10px;
      font-size: 14px;
    }
    label {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      cursor: pointer;
    }
    label + label {
      border-top: 1px solid #e0e0e0;
    }
    .description {
      font-size: 12px;
      color: #666;
      margin: 0 0 10px;
      line-height: 1.4;
    }
    .sub-option {
      padding: 4px 0 6px 26px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #555;
    }
    .sub-option select {
      font-size: 12px;
    }
  </style>
</head>
<body>
  <h3>Reuse Tabs</h3>
  <p class="description">Prevents duplicate tabs. When navigating to a URL that's already open, switches to the existing tab instead. To intentionally duplicate a tab, right-click it and choose "Duplicate tab (exclude from Reuse Tabs)".</p>
  <label>
    <input type="checkbox" id="enabled">
    Extension enabled
  </label>
  <label>
    <input type="checkbox" id="notifications">
    Show notifications
  </label>
  <label>
    <input type="checkbox" id="reloadOnSwitch">
    Reload tabs after switching
  </label>
  <div class="sub-option" id="ttlRow">
    Only if idle for
    <select id="reloadTtlMinutes">
      <option value="1">1 min</option>
      <option value="2">2 min</option>
      <option value="5">5 min</option>
      <option value="10">10 min</option>
      <option value="30">30 min</option>
      <option value="60">1 hour</option>
      <option value="0">Always</option>
    </select>
  </div>
  <div style="margin-top:10px;padding-top:8px;border-top:1px solid #e0e0e0;font-size:11px;text-align:right;">
    GitHub: <a href="https://github.com/mturley/reuse-tabs-extension" target="_blank" style="color:#4a86d4;text-decoration:none;">mturley/reuse-tabs-extension</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
