<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      margin: 0;
      padding: 12px;
      min-width: 200px;
    }
    h3 {
      margin: 0 0 10px;
      font-size: 14px;
    }
    label {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      cursor: pointer;
    }
    label + label {
      border-top: 1px solid #e0e0e0;
    }
  </style>
</head>
<body>
  <h3>Reuse Tabs</h3>
  <label>
    <input type="checkbox" id="enabled">
    Extension enabled
  </label>
  <label>
    <input type="checkbox" id="notifications">
    Show notifications
  </label>
  <script src="popup.js"></script>
</body>
</html>
